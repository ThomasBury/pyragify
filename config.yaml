repo_path: .
output_dir: ./output
max_words: 200000
max_file_size: 10485760  # 10 MB
skip_patterns:
  - ".git"
  - "uv.lock"
  - ".gitignore"
  - "*.png"
  - "*.jpg"
  - "*.jpeg"
  - "*.gif"
  - "*.bmp"
  - "*.webp"
  - "*.ico"
  - "*.svg"
skip_dirs: []
verbose: false

# Knowledge Graph Configuration
graph:
  enabled: true  # Set to true to enable graph building
  output_dir: "./graphs"  # Directory to save graph files
  format: "json"  # Graph serialization format (json, graphml)
  relationships:  # Types of relationships to extract
    - "imports"
    - "calls"
    - "inherits"
    - "references"
  max_depth: 5  # Maximum depth for relationship traversal
  compression: true  # Enable graph compression for large repositories
